<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TRA 报关单 → Excel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0 }
body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh }
.hdr { background: #1a237e; color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 12px }
.hdr h1 { font-size: 19px; font-weight: 600 }
.hdr small { font-size: 12px; opacity: .65; margin-left: 6px }
.main { max-width: 960px; margin: 28px auto; padding: 0 16px }
.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 22px; margin-bottom: 18px }
.card h2 { font-size: 14px; font-weight: 700; color: #1a237e; margin-bottom: 14px }
.dz { border: 2px dashed #90caf9; border-radius: 10px; padding: 36px 20px; text-align: center; background: #f5f9ff; transition: .2s }
.dz.drag { border-color: #1a237e; background: #e8eaf6 }
.dz .ico { font-size: 36px; margin-bottom: 8px }
.dz p { font-size: 13px; color: #666 }
.dz small { font-size: 11px; color: #999 }
.pick-btn { display: inline-block; margin-top: 12px; padding: 8px 20px; background: #1a237e; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer }
.pick-btn:hover { background: #283593 }
.file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 7px }
.file-item { display: flex; align-items: center; gap: 9px; padding: 9px 13px; background: #f5f5f5; border-radius: 8px; font-size: 13px }
.file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333 }
.file-item .size { color: #999; font-size: 11px }
.file-item .del { cursor: pointer; color: #e53935; font-size: 17px; padding: 0 4px }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 10px }
.tag-wait { background: #fff3e0; color: #e65100 }
.tag-ok { background: #e8f5e9; color: #2e7d32 }
.tag-err { background: #ffebee; color: #c62828 }
.btns { display: flex; gap: 10px; flex-wrap: wrap }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 9px 22px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer }
.btn-blue  { background: #1a237e; color: #fff } .btn-blue:hover  { background: #283593 } .btn-blue:disabled { opacity: .4; cursor: not-allowed }
.btn-green { background: #2e7d32; color: #fff } .btn-green:hover { background: #1b5e20 }
.btn-gray  { background: #e8eaf6; color: #1a237e } .btn-gray:hover  { background: #c5cae9 }
.btn-red   { background: #e53935; color: #fff } .btn-red:hover   { background: #c62828 }
.log { background: #0d1117; color: #e6edf3; border-radius: 8px; padding: 12px 14px; font-family: Consolas, monospace; font-size: 12px; min-height: 55px; max-height: 200px; overflow-y: auto; line-height: 1.85; white-space: pre-wrap; margin-top: 12px }
.log .ok { color: #3fb950 } .log .er { color: #f85149 } .log .in { color: #58a6ff }
.hist-bar { display: flex; align-items: center; padding: 12px 16px; background: #e8eaf6; border-radius: 8px; margin-bottom: 14px }
.hist-bar b { font-weight: 700; color: #1a237e }
.hist-bar small { font-size: 11px; color: #5c6bc0; display: block; margin-top: 2px }
.tbl-wrap { overflow-x: auto; margin-top: 10px }
table { border-collapse: collapse; font-size: 11.5px; min-width: 100% }
th { background: #1a237e; color: #fff; padding: 7px 9px; text-align: center; white-space: nowrap; font-size: 11px }
td { padding: 6px 9px; border-bottom: 1px solid #f0f0f0; text-align: center; white-space: nowrap; color: #333 }
tr:nth-child(even) td { background: #f8f9ff }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; display: flex; align-items: center; justify-content: center }
.modal { background: #fff; border-radius: 14px; padding: 28px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.18) }
.modal h3 { font-size: 16px; font-weight: 700; color: #1a237e; margin-bottom: 8px }
.modal p { font-size: 13px; color: #555; margin-bottom: 20px; line-height: 1.7 }
.modal button { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 10px }
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:26px">🛃</span>
  <h1>TRA 报关单 → Excel <small>纯本地 · 无需AI · 兼容单品/多品格式</small></h1>
</div>

<div class="main">

  <div class="card">
    <h2>① 上传 PDF 报关单（可多个）</h2>
    <div style="position:relative">
      <div class="dz" id="dz">
        <div class="ico">📂</div>
        <p><b>拖拽 PDF 到这里</b></p>
        <small>TRA Assessment Document PDF，支持批量上传</small>
        <div class="pick-btn" id="pickBtn">点击选择文件</div>
      </div>
      <input type="file" id="fileInput" multiple accept=".pdf"
             style="position:absolute;width:1px;height:1px;opacity:0;top:0;left:0">
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="card">
    <h2>② 提取数据</h2>
    <div class="btns">
      <button class="btn btn-blue" id="runBtn" onclick="startRun()" disabled>▶ 开始提取</button>
      <button class="btn btn-gray" onclick="resetFiles()">清空文件</button>
    </div>
    <div class="log" id="logBox">等待上传 PDF…</div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <h2>③ 预览 &amp; 下载 Excel</h2>
    <div class="hist-bar" id="histBar" style="display:none">
      <div>
        📋 当前共 <b id="histCount">0</b> 条记录
        <small id="histTime"></small>
      </div>
    </div>
    <div class="btns" style="margin-bottom:14px">
      <button class="btn btn-green" onclick="downloadExcel()">📥 下载 Excel</button>
      <button class="btn btn-red"   onclick="clearHistory()">🗑 清空历史</button>
    </div>
    <div class="tbl-wrap"><table id="previewTable"></table></div>
  </div>

</div>

<div class="overlay" id="overlay" style="display:none">
  <div class="modal">
    <h3>📋 检测到历史记录</h3>
    <p>上次保存了 <b id="mCount">0</b> 条记录（<span id="mTime"></span>），你想怎么处理？</p>
    <button style="background:#1a237e;color:#fff"           onclick="doAppend()">➕ 继续追加到历史数据</button>
    <button style="background:#f5f5f5;color:#333"           onclick="doNew()">🆕 清空历史，重新开始</button>
    <button style="background:none;color:#999;font-weight:400;font-size:12px" onclick="doView()">只查看历史，不做改动</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const STORAGE_KEY = 'tra_rows_v1';
const HDR = [
  '发票编码 Invoice NO','提单号 BILL NO','TANSAD NO',
  '申报产品名称','规格型号 Specification',
  '海关编码 H.S.Code','海关调整编码',
  '申报数量','海关调整数量',
  '申报单价 USD','海关调整单价 USD',
  '申报估值 USD','海关估值 USD',
  'IMP Rate','CPF Rate','RDL Rate','VAT Rate'
];
let FILES = [], ROWS = [];

// ── 初始化 ────────────────────────────────────────────────────
window.onload = () => {
  const fi = document.getElementById('fileInput');
  document.getElementById('pickBtn').onclick = () => fi.click();
  fi.onchange = () => { addFiles(fi.files); fi.value = ''; };

  const dz = document.getElementById('dz');
  dz.ondragover  = e => { e.preventDefault(); dz.classList.add('drag'); };
  dz.ondragleave = () => dz.classList.remove('drag');
  dz.ondrop      = e => { e.preventDefault(); dz.classList.remove('drag'); addFiles(e.dataTransfer.files); };

  const hist = loadHist();
  if (hist?.rows?.length > 0) {
    document.getElementById('mCount').textContent = hist.rows.length;
    document.getElementById('mTime').textContent  = hist.time || '';
    document.getElementById('overlay').style.display = 'flex';
  }
};

// ── 历史弹窗 ──────────────────────────────────────────────────
function doAppend() { ROWS = loadHist()?.rows?.slice() || []; closeOv(); showResult(); }
function doNew()    { localStorage.removeItem(STORAGE_KEY); ROWS = []; closeOv(); }
function doView()   { ROWS = loadHist()?.rows?.slice() || []; closeOv(); showResult(); }
function closeOv()  { document.getElementById('overlay').style.display = 'none'; }

// ── localStorage ──────────────────────────────────────────────
function saveHist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ rows: ROWS, time: new Date().toLocaleString('zh-CN') }));
}
function loadHist() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function clearHistory() {
  if (!confirm('确定清空所有历史记录？')) return;
  localStorage.removeItem(STORAGE_KEY); ROWS = [];
  document.getElementById('resultCard').style.display = 'none';
  log('历史已清空。');
}

// ── 文件管理 ──────────────────────────────────────────────────
function addFiles(list) {
  [...list].filter(f => f.name.toLowerCase().endsWith('.pdf'))
           .forEach(f => { if (!FILES.find(x => x.name === f.name)) FILES.push(f); });
  renderFiles();
}
function removeFile(name) { FILES = FILES.filter(f => f.name !== name); renderFiles(); }
function resetFiles()     { FILES = []; renderFiles(); clearLog(); }
function sid(n)           { return n.replace(/[^a-zA-Z0-9]/g, '_'); }
function setSt(name, text, cls) {
  const el = document.getElementById('st_' + sid(name));
  if (el) { el.textContent = text; el.className = 'tag ' + cls; }
}
function renderFiles() {
  document.getElementById('fileList').innerHTML = FILES.map(f => `
    <div class="file-item">
      <span>📄</span>
      <span class="name" title="${f.name}">${f.name}</span>
      <span class="size">${(f.size/1024).toFixed(0)} KB</span>
      <span class="tag tag-wait" id="st_${sid(f.name)}">等待</span>
      <span class="del" onclick='removeFile(${JSON.stringify(f.name)})'>✕</span>
    </div>`).join('');
  document.getElementById('runBtn').disabled = FILES.length === 0;
}

// ── 日志 ──────────────────────────────────────────────────────
function log(msg, cls = '') {
  const box = document.getElementById('logBox');
  const s = document.createElement('span');
  if (cls) s.className = cls;
  s.textContent = msg + '\n';
  box.appendChild(s);
  box.scrollTop = box.scrollHeight;
}
function clearLog() { document.getElementById('logBox').innerHTML = ''; }

// ── 主流程 ────────────────────────────────────────────────────
async function startRun() {
  document.getElementById('runBtn').disabled = true;
  clearLog();
  const newRows = [];
  for (let i = 0; i < FILES.length; i++) {
    const f = FILES[i];
    log(`[${i+1}/${FILES.length}] ${f.name}`, 'in');
    setSt(f.name, '处理中…', 'tag-wait');
    try {
      const items = await parsePDF(f);
      newRows.push(...items);
      log(`  ✓ 提取到 ${items.length} 行`, 'ok');
      setSt(f.name, `✓ ${items.length} 条`, 'tag-ok');
    } catch (e) {
      log(`  ✗ ${e.message}`, 'er');
      setSt(f.name, '错误', 'tag-err');
    }
  }
  ROWS.push(...newRows);
  saveHist();
  log(`完成！本次新增 ${newRows.length} 条，累计共 ${ROWS.length} 条。`, 'ok');
  document.getElementById('runBtn').disabled = false;
  if (ROWS.length > 0) showResult();
}

function showResult() {
  const hist = loadHist();
  document.getElementById('histCount').textContent = ROWS.length;
  document.getElementById('histTime').textContent  = hist?.time ? '最后更新：' + hist.time : '';
  document.getElementById('histBar').style.display = ROWS.length > 0 ? 'flex' : 'none';
  renderTable();
  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';
  rc.scrollIntoView({ behavior: 'smooth' });
}

// ── 表格 & Excel 下载 ─────────────────────────────────────────
function toArr(r) {
  return [r.invoice_no, r.bill_no, r.tansad_no, r.desc, r.spec,
          r.hs_d, r.hs_a, r.qty_d, r.qty_a, r.price_d, r.price_a,
          r.inv_d, r.cval, r.imp, r.cpf, r.rdl, r.vat];
}
function renderTable() {
  const ths = HDR.map(h => `<th>${h}</th>`).join('');
  const trs = ROWS.map(r => `<tr>${toArr(r).map(v => `<td>${v||''}</td>`).join('')}</tr>`).join('');
  document.getElementById('previewTable').innerHTML = `<thead><tr>${ths}</tr></thead><tbody>${trs}</tbody>`;
}
function downloadExcel() {
  const data = [HDR, ...ROWS.map((r, i) => {
    const row = toArr(r);
    row[12] = { f: `I${i+2}*K${i+2}` }; // 海关估值 = 海关调整数量 × 海关调整单价
    return row;
  })];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [16,20,18,20,38,18,18,10,10,12,12,12,12,9,9,9,9].map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet2');
  XLSX.writeFile(wb, `TRA报关单_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ══════════════════════════════════════════════════════════════
//  PDF 解析
// ══════════════════════════════════════════════════════════════
async function parsePDF(file) {
  // 1. 逐页提取文字，y = 距页顶距离
  const pdf   = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const pages = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const vp   = page.getViewport({ scale: 1 });
    const ct   = await page.getTextContent();
    pages.push(ct.items
      .filter(it => it.str.trim())
      .map(it => ({ t: it.str.trim(), x: it.transform[4], y: vp.height - it.transform[5] - it.height }))
    );
    log(`  页${p}: ${pages[p-1].length} 词`);
  }

  // 2. 第1页全局字段（坐标来自实测）
  const p1      = pages[0];
  const tansad  = pick(p1, 434, 101, 40, 8);
  const invoice = pick(p1, 440, 197, 40, 8);
  const billno  = pick(p1, 437, 293, 40, 8);
  log(`  TANSAD:${tansad}  发票:${invoice}  提单:${billno}`);

  // 3. 所有词附加全局 y（gy = 页码×10000 + y），支持跨页处理
  const allW = pages.flatMap((ws, pi) => ws.map(w => ({ ...w, pi, gy: pi * 10000 + w.y })));

  // 4. 找所有主Item编号（Item No.，x≈72）
  const mainItems = allW
    .filter(w => w.x > 68 && w.x < 80 && /^\d{1,2}$/.test(w.t) && +w.t >= 1 && +w.t <= 20)
    .sort((a, b) => a.gy - b.gy);

  const results = [];
  const seen    = new Set();

  for (let mi = 0; mi < mainItems.length; mi++) {
    const mw   = mainItems[mi];
    const mKey = `${tansad}_${mw.gy}`;
    if (seen.has(mKey)) continue;
    seen.add(mKey);

    // 该主Item的词范围：到下一个主Item之前
    const gyE   = mainItems[mi + 1]?.gy ?? Infinity;
    const scope = allW.filter(w => w.gy >= mw.gy && w.gy < gyE);

    // 5. 找28.Model表头，划分 HS区（之前）和 子货物区（之后）
    const mhdr   = scope.find(w => w.t.startsWith('28.Model') && w.x > 55);
    const mhdrGy = mhdr?.gy ?? (mw.gy + 500);
    const mhdrY  = mhdr?.y  ?? 0;

    // 6. HS Code（28.Model表头之前的第一个D/A行）
    const pre  = scope.filter(w => w.gy < mhdrGy);
    const hsDw = pre.filter(w => w.t === 'D' && w.x > 293 && w.x < 305).sort((a,b) => a.gy-b.gy)[0];
    const hsAw = pre.filter(w => w.t === 'A' && w.x > 293 && w.x < 305).sort((a,b) => a.gy-b.gy)[0];
    const hs_d = hsDw ? scope.find(w => w.pi===hsDw.pi && w.x>322 && w.x<362 && near(w.y,hsDw.y,5))?.t ?? '' : '';
    const hs_a = hsAw ? scope.find(w => w.pi===hsAw.pi && w.x>322 && w.x<362 && near(w.y,hsAw.y,5))?.t ?? '' : '';

    // 7. 税率（IMP/CPF/RDL/VAT，Rate列 x≈200-250）
    const imp = txR(scope,'IMP'), cpf = txR(scope,'CPF');
    const rdl = txR(scope,'RDL'), vat = txR(scope,'VAT');

    // 8. 子货物（x≈44，在28.Model表头之后）
    const subItems = scope
      .filter(w => w.x > 40 && w.x < 55 && /^\d{1,2}$/.test(w.t) && +w.t >= 1 && +w.t <= 20 && w.gy > mhdrGy)
      .sort((a, b) => a.gy - b.gy);

    for (const sw of subItems) {
      // D行：28.Model之后、子货物编号之前，最近的一个D
      const dRow = scope.filter(w => w.t==='D' && w.x>293 && w.x<305 && w.gy>mhdrGy && w.gy<sw.gy)
                        .sort((a,b) => b.gy-a.gy)[0];
      // A行：子货物编号之后，最近的一个A
      const aRow = scope.filter(w => w.t==='A' && w.x>293 && w.x<305 && w.gy>sw.gy)
                        .sort((a,b) => a.gy-b.gy)[0];
      if (!dRow) continue;

      const dY = dRow.y, dPi = dRow.pi;
      const aY = aRow?.y ?? sw.y + 15;
      // 文字下限：D行上方30pt，但不超过28.Model表头行（防止抓到表头文字）
      const lower = Math.max(dY - 30, mhdrY + 1);

      const desc = getWords(scope, dPi, 32,  200, lower, sw.y,   true) || '';
      const spec = getWords(scope, dPi, 195, 295, lower, aY + 3, true) || '/';

      // 数量/单价/金额（x>315，与D行/A行同y）
      const [qty_d, price_d, inv_d] = getNums(scope, dPi, dY);
      const [qty_a, price_a]        = aRow ? getNums(scope, aRow.pi, aRow.y) : ['',''];
      const cval = qty_a && price_a ? (parseFloat(qty_a) * parseFloat(price_a)).toFixed(2) : '';

      results.push({
        invoice_no: invoice, bill_no: billno, tansad_no: tansad,
        desc, spec, hs_d, hs_a,
        qty_d, qty_a, price_d, price_a, inv_d, cval,
        imp: pct(imp), cpf: pct(cpf), rdl: pct(rdl), vat: pct(vat)
      });
    }
  }
  return results;
}

// ── 工具函数 ──────────────────────────────────────────────────

// 收集指定范围内的文字（可排除纯数字）
function getWords(scope, pi, x1, x2, yLow, yHigh, noNum) {
  return scope
    .filter(w => w.pi===pi && w.x>x1 && w.x<x2 && w.y>yLow && w.y<=yHigh && !(noNum && isNum(w.t)))
    .sort((a,b) => a.y-b.y || a.x-b.x)
    .map(w => w.t).join(' ').trim();
}

// 收集同一行 x>315 的数字，按x从左到右：数量、单价、金额
function getNums(scope, pi, rowY) {
  return scope
    .filter(w => w.pi===pi && isNum(w.t) && near(w.y, rowY, 6) && w.x > 315)
    .sort((a,b) => a.x-b.x)
    .map(w => w.t.replace(/,/g,''));
}

// 找坐标最近的词
function pick(ws, tx, ty, dx, dy) {
  return ws
    .filter(w => Math.abs(w.x-tx)<=dx && Math.abs(w.y-ty)<=dy)
    .sort((a,b) => (Math.abs(a.x-tx)+Math.abs(a.y-ty)) - (Math.abs(b.x-tx)+Math.abs(b.y-ty)))[0]?.t ?? '';
}

// 找税率值（税种关键词 x<55，Rate列 x=200-250，同一行）
function txR(scope, type) {
  const tw = scope.find(w => w.t===type && w.x<55);
  if (!tw) return '';
  return scope.find(w => isNum(w.t) && w.pi===tw.pi && near(w.y,tw.y,6) && w.x>200 && w.x<250)?.t ?? '';
}

function near(a, b, d) { return Math.abs(a - b) < d; }
function isNum(s)       { return /^[\d,]+\.?\d*$/.test(s); }
function pct(s)         { return s ? parseFloat(s).toFixed(2) + '%' : ''; }
</script>
</body>
</html>
